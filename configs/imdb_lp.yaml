device: "cuda:0"

# Seeds match Bishwash's RGCN-LP eval contract
seeds: [1566911444, 20241017, 20251017]

model:
  # nn.Embedding(num_nodes, in_dim) since LP runs with no input features
  in_dim: 64
  # Vanilla DHN patterns (p1, c2, p3) - swap when prof's "our version" patterns arrive
  layers_config:
    - p1: [-1, 64, 1]
      c2: [-1, 64, 2]
      p3: [-1, 64, 3]
  activation:
    name: ReLU
    kwargs:
      inplace: false

training:
  epochs: 200
  patience: 15        # val-BCE early stopping
  optimizer:
    name: AdamW
    kwargs:
      lr: 0.005
      weight_decay: 0.001
      betas: [0.9, 0.999]

eval:
  hits_k: [1, 3, 5]
  threshold: 0.5
